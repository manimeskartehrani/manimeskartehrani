name: Waka Readme

on:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:  # lets you trigger it manually from the Actions tab

# Without this, the default GITHUB_TOKEN is often read-only and the
# action cannot push the updated README back to the repo (silent no-op).
permissions:
  contents: write

jobs:
  update-readme:
    name: Update this repo's README
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          TIME_RANGE: last_7_days   # free-plan safe; all_time/last_year need a paid plan
          SHOW_TITLE: "true"
          SHOW_TIME: "true"
          SHOW_TOTAL: "true"
          LANG_COUNT: "8"
